services:
  huginn-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HUGINN_DB_PATH=/data/huginn.db
    volumes:
      - huginn-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.huginn.rule=Host(`huginn.internal`)"
      - "traefik.http.services.huginn.loadbalancer.server.port=8000"
    restart: unless-stopped

volumes:
  huginn-data:
